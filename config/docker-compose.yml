services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    # For hardware acceleration, uncomment and modify one of the lines below:
    # extends:
    #   file: hwaccel.transcoding.yml
    #   service: cpu # options: [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl]
    volumes:
      # Do not edit the next line. Change UPLOAD_LOCATION in .env if needed
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - '2283:2283'
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      test: curl --fail http://localhost:2283/api/server/ping || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  immich-machine-learning:
    container_name: immich_machine_learning
    # For hardware acceleration, add one of: -[armnn, cuda, rocm, openvino, rknn] to tag
    # Example: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    # For hardware acceleration, uncomment below:
    # extends:
    #   file: hwaccel.ml.yml
    #   service: cpu # options: [armnn, cuda, rocm, openvino, openvino-wsl, rknn]
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: always
    healthcheck:
      test: curl --fail http://localhost:3003 || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
    restart: always
    healthcheck:
      test: redis-cli ping || exit 1
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
      # Uncomment if database is on HDD (not SSD)
      # DB_STORAGE_TYPE: 'HDD'
    volumes:
      # Do not edit the next line. Change DB_DATA_LOCATION in .env if needed
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    healthcheck:
      test: pg_isready -d ${DB_DATABASE_NAME} -U ${DB_USERNAME} || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  model-cache:
